<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Buat Formulir</title>
</head>
<body>
    
    <h1>formulir pendaftaran</h1>

    <form action="">
       <label for="nism">Nisn</label>
       <input type="name=nisn" placeholder="Masukan NISN">
       <br>
       <label for="nama">nama</label>
       <input type="text" name="nama" placeholder="Masukan nama">
       <br>
       <label for="email">email</label>
       <input type="text" name="email" placeholder="Masukan EMAIL">
       <br>
       <label for="password">password</label>
       <input type="password" name="password" placeholder="Masukan password">
       <br>
       <label for="Telepon">Telepon</label>
       <input type="tel" name="Telepon" placeholder="Masukan Telepon">
       <br>
       <label for="alamat">alamat</label>
       <textarea name="alamat" id=""rows=10></textarea>
       <br>
       <label for="file"> upload file</label>
       <input type="file" name="file" id="">
       <br>
       <label for="tanggal">tanggal</label>
       <input type="date" name="tanggal" id="">
       <br>
       <label for="jenis">jenis kelamin</label>
       <input type="radio" name="jenis" id="laki laki">
       <label for="laki laki">laki - laki</label>
       <input type="radio" name="jenis" id="perempuan">
       <label for="perempuan">perempuan</label>
       <br>

    
          <option value="laki laki"></option>
          <option value="perempuan"></option>
        </select>
       

       
   </form>

</body>
</html>
